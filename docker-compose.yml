services:
  # app:
  #   build: .
  #   container_name: blink-app
  #   ports:
  #     - '${PORT}:3000'
  #   env_file: .env
  #   depends_on:
  #     - postgres
  #     - redis
  #   volumes:
  #     - .:/app
  #     - /app/node_modules
  #   restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: blink-postgres
    environment:
      POSTGRES_USER: blink_admin
      POSTGRES_PASSWORD: "Blink@2025Secure!"
      POSTGRES_DB: blink_campus_db
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: blink-redis
    # No password in dev — just leave REDIS_PASSWORD blank in .env
    command: redis-server
    ports:
      - '${REDIS_PORT:-6379}:6379'
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: blink-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@blink.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    restart: unless-stopped

  # MinIO — local S3-compatible storage
  # API:     http://localhost:9000  (set AWS_ENDPOINT=http://localhost:9000 in .env)
  # Console: http://localhost:9001
  minio:
    image: minio/minio:latest
    container_name: blink-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-blink_minio_key}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-blink_minio_secret_2025}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # MailHog — catches all outgoing SMTP in dev, no real mail server needed
  # SMTP: localhost:1025  |  Inbox UI: http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    container_name: blink-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
