apiVersion: v1
kind: ConfigMap
metadata:
  name: ireeme-config
data:
  redis-host: "redis-service"
  redis-port: "6379"
  rate-limit-ttl: "60"
  rate-limit-max: "300"
  request-timeout: "30000"
  cache-default-ttl: "300"
  cache-user-ttl: "600"
  cache-school-ttl: "1800"
  cors-allowed-origins: "https://yourdomain.com,https://app.yourdomain.com"
  aws-region: "us-east-1"
  aws-s3-bucket-name: "ireeme-production-files"
  jwt-access-expiry: "15m"
  jwt-refresh-expiry: "7d"
  bcrypt-rounds: "12"
